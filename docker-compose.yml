services:
  # PostgreSQL 16 + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prophet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: prophet
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophet"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Valkey (Redis-compatible)
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama (local SLM/LLM) — CPU mode by default, GPU via profile
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Model will be pulled on first API call via backend
    # Or manually: docker compose exec ollama ollama pull llama3.1:8b
    # GPU: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://prophet:${POSTGRES_PASSWORD:-secret}@db:5432/prophet
      VALKEY_URL: valkey://valkey:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.1:8b
      SLM_MODEL: llama3.1:8b
      DEFAULT_LLM_PROVIDER: ollama
      LLM_TIER3_RATIO: "0.1"
      LLM_CACHE_TTL: "3600"
      CORS_ALLOW_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  ollama_data:
