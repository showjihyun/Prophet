services:
  # PostgreSQL 16 + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prophet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: prophet
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophet"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Valkey (Redis-compatible)
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama (local SLM/LLM) — defaults to CPU mode; layer the GPU
  # override on top for real-world performance.
  #
  # **Recommended (NVIDIA users):**
  #   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
  #
  # This passes the NVIDIA runtime through to the container and unlocks
  # CUDA inference. On an RTX 4070-class GPU llama3.1:8b runs at ~200+
  # tok/s and every agent tick + opinion synthesis finishes in sub-second
  # wall time. CPU-only inference is 20-50× slower and will pin every
  # core of the host when simulations are running.
  #
  # **CPU-only hosts:** override the defaults to a smaller model via
  # OLLAMA_DEFAULT_MODEL and SLM_MODEL env vars — e.g., llama3.2:1b fits
  # in ~2 GiB RAM and runs usably on modest laptops.
  #
  # **Image pin:** 0.11.10. The 0.20.x series has a regression that
  # crashes the llama runner on CPU inference for Gemma + Llama models
  # on Ryzen ("llama runner process has terminated: %!w(<nil>)" with no
  # stack). 0.11.10 is the last stable build before that regression.
  ollama:
    image: ollama/ollama:0.11.10
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    # Default model: llama3.1:8b (4.7 GB on disk, ~5.6 GiB VRAM). Pull:
    #   docker compose exec ollama ollama pull llama3.1:8b

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://prophet:${POSTGRES_PASSWORD:-secret}@db:5432/prophet
      VALKEY_URL: valkey://valkey:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.1:8b
      SLM_MODEL: llama3.1:8b
      DEFAULT_LLM_PROVIDER: ollama
      LLM_TIER3_RATIO: "0.1"
      LLM_CACHE_TTL: "3600"
      CORS_ALLOW_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  ollama_data:
