services:
  # PostgreSQL 16 + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: prophet
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: prophet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophet"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Valkey (Redis-compatible)
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Ollama (local SLM/LLM)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://prophet:secret@db:5432/prophet
      VALKEY_URL: valkey://valkey:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_DEFAULT_MODEL: llama3.2
      SLM_MODEL: phi4
      DEFAULT_LLM_PROVIDER: ollama
      LLM_TIER3_RATIO: "0.1"
      LLM_CACHE_TTL: "3600"
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy

  # Frontend (Vite dev server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
