name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest tests/ -q

  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        # Must be `tsc -b`, not `tsc --noEmit`. The root tsconfig.json is
        # references-only with `files: []`, so `tsc --noEmit` compiles the
        # empty project and falsely returns 0 errors (silent no-op).
        # Use build mode to walk tsconfig.app.json and tsconfig.node.json.
        run: npx tsc -b

      - name: Lint
        run: npx eslint .

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Build
        # Re-runs tsc -b internally plus vite build, catching any bundler
        # regressions (chunk layout, asset imports) the earlier steps miss.
        run: npm run build
